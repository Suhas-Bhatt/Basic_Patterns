<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-decor">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="card">
    <header class="header">
      <h1>Pattern Visualizer</h1>
      <p class="subtitle">Draw classic mathematical star designs</p>
    </header>

    <div class="generator-controls">
      <div class="control-row">
        <label for="pattern-select">Pattern Type</label>
        <select id="pattern-select">
          <option value="hollow_rectangle">Hollow Rectangle</option>
          <option value="mirrored_half_pyramid">Mirrored Half Pyramid</option>
          <option value="inverted_half_pyramid">Inverted Half Pyramid (Numbers)</option>
          <option value="floyds_triangle">Floyd's Triangle</option>
          <option value="zero_one_triangle">0-1 Triangle</option>
          <option value="butterfly">Butterfly Pattern</option>
          <option value="solid_rhombus">Solid Rhombus</option>
          <option value="hollow_rhombus">Hollow Rhombus</option>
          <option value="diamond">Diamond Pattern</option>
        </select>
      </div>

      <div class="control-row param-row">
        <div class="param-box" id="param-n-box">
          <label for="param-n">Size (n)</label>
          <input type="number" id="param-n" value="5" min="1" max="25">
        </div>
        <div class="param-box hidden" id="param-cols-box">
          <label for="param-cols">Columns</label>
          <input type="number" id="param-cols" value="15" min="1" max="40">
        </div>
      </div>

      <button id="generate-btn">⚡ Generate Pattern</button>
    </div>

    <div class="pattern-output-container">
      <pre id="pattern-display"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
